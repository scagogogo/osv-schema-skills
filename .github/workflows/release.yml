# Release：打 tag (v*) 触发 goreleaser 构建全平台二进制并发布 GitHub Release
# AI Agent 可从 Release 下载对应平台二进制直接运行，也可从源码编译
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # goreleaser 需要完整 git 历史生成 changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.18'
          stable: true
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
